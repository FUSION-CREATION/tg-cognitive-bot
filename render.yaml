services:
  - type: worker
    name: tg-cognitive-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STT_MODEL
        value: gpt-4o-mini-transcribe
      - key: STT_LANGUAGE
        value: ru
      - key: DB_PATH
        value: /var/data/bot.db
    disk:
      name: bot-data
      mountPath: /var/data
      sizeGB: 1
