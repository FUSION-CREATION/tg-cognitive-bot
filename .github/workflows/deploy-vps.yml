name: Deploy To VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            if [ ! -d /root/tg-cognitive-bot/.git ]; then
              rm -rf /root/tg-cognitive-bot
              git clone https://github.com/FUSION-CREATION/tg-cognitive-bot.git /root/tg-cognitive-bot
            fi
            cd /root/tg-cognitive-bot
            git fetch origin main
            git reset --hard origin/main
            mkdir -p data
            docker compose up -d --build --force-recreate
            docker compose ps
